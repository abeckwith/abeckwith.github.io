    <style>
       




        @keyframes fadeIn {
            to {

        body {

        }

        a:link,

        }

        a:hover {
            color: rgb(221, 255, 0);
        }

        h4 {
            margin-left: 15%;
            margin-right: 12%;

        #content {

            margin-right: 5%;
        }

        span:hover {
            color: rgb(252, 194, 112);
        }

        @keyframes slide-in-left {
            from {
                transform: translateX(-500%);
                /* Start off-screen to the left */
            }

            to {
                transform: translateX(0);
                /* End at its natural position */
            }
        }

        @keyframes slide-in-right {
            from {
                transform: translateX(500%);
                /* Start off-screen to the left */
            }

            to {
                transform: translateX(0);
                /* End at its natural position */
            }
        }

        /* Apply the animation to an element */
        .slide-left {
            border: 5px solid rgb(252, 194, 112);
            border-radius: 5px;
            animation-name: slide-in-left;
            animation-duration: 3s;
            /* Animation duration */
            animation-timing-function: ease-out;
            /* Easing function */
            animation-fill-mode: forwards;
            /* Keep the final state */
        }

        .slide-right {
            border: 5px solid rgb(252, 194, 112);
            border-radius: 5px;
            animation-name: slide-in-right;
            animation-duration: 3s;
            /* Animation duration */
            animation-timing-function: ease-out;
            /* Easing function */
            animation-fill-mode: forwards;
            /* Keep the final state */
        }
        #cover{
            width:20vw;
        }
        @media screen and (max-width: 700px) {
            #cover{
                width:40vw;
            }
        }
    </style>
